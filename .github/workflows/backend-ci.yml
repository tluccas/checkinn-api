name: Backend CI - Unit Tests

on:
  push:
    paths:
      - "checkinn-api/**"
      - "docker-compose.yml"
    branches: [main]
  pull_request:
    paths:
      - "checkinn-api/**"
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Start Redis & PostgreSQL
        run: |
          # Sobe apenas o banco e o Redis para os testes unitários
          docker-compose up -d postgres redis
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./checkinn-api/package-lock.json

      - name: Install Dependencies
        working-directory: ./checkinn-api/
        run: npm install

      - name: Run Migrations and Tests
        working-directory: ./checkinn-api
        env:
          # Nota: localhost pq o Github Actions mapeia as portas do container para o host (correção de erro)
          DB_HOST: localhost
          DB_PORT: 5433
          DB_USERNAME: checkinn
          DB_PASSWORD: checkinn_secret
          DB_NAME: checkinn_db
          REDIS_HOST: localhost
          REDIS_PORT: 6380
          JWT_SECRET: test_secret
          NODE_ENV: test
        run: |
          npm run typeorm:migration:run
          npm run test

      - name: Stop Services
        if: always()
        run: docker-compose down
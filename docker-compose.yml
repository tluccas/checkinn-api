services:
  postgres:
    image: postgres:17-alpine
    container_name: checkinn-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-checkinn}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-checkinn_secret}
      POSTGRES_DB: ${DB_NAME:-checkinn_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-checkinn} -d ${DB_NAME:-checkinn_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: checkinn-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./checkinn-api
      dockerfile: Dockerfile
    container_name: checkinn-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-checkinn}
      DB_PASSWORD: ${DB_PASSWORD:-checkinn_secret}
      DB_NAME: ${DB_NAME:-checkinn_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-secret_key_para_jwt}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-6h}
      PORT: 3000
    command: sh -c "npm run typeorm:migration:run && npm run start:prod"

  frontend:
    build:
      context: ./checkinn-frontend
      dockerfile: Dockerfile
    container_name: checkinn-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - api

volumes:
  pgdata:
